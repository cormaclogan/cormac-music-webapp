<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Songs</title>

    <!-- Korean font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="songs.css">
</head>

<body>

<!-- CUPIDS -->
<img src="cupid.gif" class="cupid left-cupid">
<img src="cupid.gif" class="cupid right-cupid">

<!-- 🎧 AUDIO -->
<audio id="bgMusic" loop>
    <source src="music4.mp3" type="audio/mpeg">
</audio>

<!-- NAVBAR -->
<nav>
    <a href="index.html">Home</a>
    <a href="artists.html">Artists</a>
    <a href="albums.html">Albums</a>
</nav>

<!-- TITLE -->
<h1 class="glitch" data-text="SONG ARCHIVE">
    SONG ARCHIVE
</h1>
<div class="subtitle">
    노래 기록 • 컬렉션
</div>

<!-- FORM -->
<div class="form-box">

    <div class="form-row">

        <div class="field">
            <input type="text" id="songName" placeholder="Song Name">
            <div class="subtitle">노래 이름</div>
        </div>

        <div class="field">
            <input type="number" id="releaseYear" placeholder="Release Year">
            <div class="subtitle">발매 연도</div>
        </div>

        <div class="field">
            <input type="number" id="albumId" placeholder="Album ID">
            <div class="subtitle">앨범 ID</div>
        </div>

    </div>

    <button onclick="createSong()">Add Song</button>
    <div class="subtitle">노래 추가</div>

</div>

<!-- TABLE -->
<table id="songTable">
    <thead>
        <tr>
            <th>ID<div class="subtitle">번호</div></th>
            <th>Song Name<div class="subtitle">노래 이름</div></th>
            <th>Year<div class="subtitle">연도</div></th>
            <th>Album ID<div class="subtitle">앨범</div></th>
            <th>Actions<div class="subtitle">작업</div></th>
        </tr>
    </thead>

    <tbody>
        <!-- Data loads here -->
    </tbody>
</table>

<!-- JS -->
<script src="songs.js" defer></script>

<!-- 🎧 MUSIC START ON CLICK -->
<script>
let started = false;

document.addEventListener("click", () => {
    if (!started) {
        const music = document.getElementById("bgMusic");
        music.volume = 0.5; // 🔊 lower volume here
        music.play();
        started = true;
    }
});
</script>

</body>
</html>
