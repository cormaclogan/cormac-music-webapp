<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Artists</title>

    <!-- Korean Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="artists.css">
</head>

<body>

<!-- CUPIDS -->
<img src="cupid.gif" class="cupid left-cupid" id="leftCupid">

<img src="cupid.gif" class="cupid right-cupid" id="rightCupid">

<!-- AUDIO -->
<audio id="bgMusic" loop>
    
    <source src="music2.mp3" type="audio/mpeg">
</audio>
<audio id="leftCupidSound">
    <source src="leftcupid.mp3" type="audio/mpeg">
</audio>

<audio id="rightCupidSound">
    <source src="rightcupid.mp3" type="audio/mpeg">
</audio>

<!-- NAVBAR -->
<nav>
    <a href="index.html">Home</a>
    <a href="albums.html">Albums</a>
    <a href="songs.html">Songs</a>
</nav>

<!-- TITLE -->
<h1 class="glitch" data-text="ARTIST ARCHIVE">
    ARTIST ARCHIVE
</h1>

<div class="subtitle">
    음악가 기록 • 아카이브
</div>

<!-- FORM -->
<div class="form-box">

    <div class="form-row">

        <div class="field">
            <input type="text" id="artistName" placeholder="Artist Name">
            <div class="subtitle">아티스트 이름</div>
        </div>

        <div class="field">
            <input type="text" id="genre" placeholder="Genre">
            <div class="subtitle">장르</div>
        </div>

        <div class="field">
            <input type="number" id="listeners" placeholder="Monthly Listeners">
            <div class="subtitle">월간 청취자 수</div>
        </div>

    </div>

    <button onclick="createArtist()">Add Artist</button>

    <div class="subtitle">
        아티스트 추가
    </div>

</div>

<!-- TABLE -->
<table id="artistTable">

    <thead>
        <tr>
            <th>ID<div class="subtitle">번호</div></th>
            <th>Artist Name<div class="subtitle">아티스트 이름</div></th>
            <th>Genre<div class="subtitle">장르</div></th>
            <th>Monthly Listeners<div class="subtitle">청취자 수</div></th>
            <th>Actions<div class="subtitle">작업</div></th>
        </tr>
    </thead>

    <tbody>
        <!-- Data -->
    </tbody>

</table>

<!-- VIDEO POPUP -->
<div id="videoPopup">

    <div class="videoBox">

        <span id="closeVideo">&times;</span>

        <video id="mjVideo" controls>
            <source src="video5.mp4" type="video/mp4">
        </video>

    </div>

</div>
<script src="artists.js" defer></script>

<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    /* ========================= */
    /* MUSIC START ON CLICK */
    /* ========================= */

    const music = document.getElementById("bgMusic");
    const leftCupidSound = document.getElementById("leftCupidSound");

const rightCupidSound = document.getElementById("rightCupidSound");

const leftCupid = document.getElementById("leftCupid");

const rightCupid = document.getElementById("rightCupid");

    let started = false;

    document.addEventListener("click", () => {

        if (!started) {

            music.volume = 0.5;

            music.play();

            started = true;
        }
    });
    

    /* ========================= */
    /* cupid shit */
    /* ========================= */
 leftCupid.addEventListener("mousedown", () => {
    music.volume = 0.05;

    leftCupidSound.currentTime = 0;
    leftCupidSound.play();
});

leftCupidSound.addEventListener("ended", () => {
    music.volume = 0.5;
});

rightCupid.addEventListener("mousedown", () => {
    music.volume = 0.05;

    rightCupidSound.currentTime = 0;
    rightCupidSound.play();
});

rightCupidSound.addEventListener("ended", () => {
    music.volume = 0.5;
});
    

    const artistInput = document.getElementById("artistName");

    const popup = document.getElementById("videoPopup");

    const video = document.getElementById("mjVideo");
    const audioContext = new AudioContext();

const source = audioContext.createMediaElementSource(video);

const gainNode = audioContext.createGain();

gainNode.gain.value = 2.5;

source.connect(gainNode);

gainNode.connect(audioContext.destination);

const closeBtn = document.getElementById("closeVideo");


    let popupOpened = false;

    /* LIVE INPUT DETECTION */

    artistInput.addEventListener("input", () => {

        const value = artistInput.value
            .trim()
            .toLowerCase();

        if (value.includes("michael jackson") && !popupOpened){

            popup.style.display = "flex";
            popup.style.visibility = "visible";
            popup.style.opacity = "1";

            video.play();

            music.volume = 0.03;

            popupOpened = true;
        }

        if (!value.includes("michael jackson")) {

            popupOpened = false;
        }
    });

    /* CLOSE VIDEO */

    closeBtn.addEventListener("click", () => {

        popup.style.display = "none";

        video.pause();

        video.currentTime = 0;

        music.volume = 0.5;
    });

});
</script>

</body>
</html>
