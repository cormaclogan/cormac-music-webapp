<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>

    <!-- Korean font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="albums.css">

    <!-- ✅ JS (DEFER FIX) -->
    <script src="albums.js" defer></script>
</head>

<body>

<!-- CUPIDS -->
<img src="cupid.gif" class="cupid left-cupid">
<img src="cupid.gif" class="cupid right-cupid">

<!-- 🎧 AUDIO -->
<audio id="bgMusic" loop>
    <source src="music1.mp3" type="audio/mpeg">
</audio>

<!-- NAVBAR -->
<nav>
    <a href="index.html">Home</a>
    <a href="artists.html">Artists</a>
    <a href="songs.html">Songs</a>
</nav>

<!-- TITLE -->
<h1 class="glitch" data-text="ALBUM ARCHIVE">
    ALBUM ARCHIVE
</h1>
<div class="subtitle">
    복수의 기록 • 음악 컬렉션
</div>

<!-- FORM -->
<div class="form-box">

    <div class="form-row">

        <div class="field">
            <input type="text" id="albumName" placeholder="Album Name">
            <div class="subtitle">앨범 이름</div>
        </div>

        <div class="field">
            <input type="number" id="releaseYear" placeholder="Release Year">
            <div class="subtitle">발매 연도</div>
        </div>

        <div class="field">
            <input type="number" id="listens" placeholder="Number of Listens">
            <div class="subtitle">재생 수</div>
        </div>

        <div class="field">
            <input type="number" id="artistId" placeholder="Artist ID">
            <div class="subtitle">아티스트 ID</div>
        </div>

    </div>

    <button onclick="createAlbum()">Add Album</button>
    <div class="subtitle">앨범 추가</div>

</div>

<!-- TABLE -->
<table id="albumTable">
    <thead>
        <tr>
            <th>ID<div class="subtitle">번호</div></th>
            <th>Album Name<div class="subtitle">앨범 이름</div></th>
            <th>Year<div class="subtitle">연도</div></th>
            <th>Listens<div class="subtitle">재생 수</div></th>
            <th>Artist ID<div class="subtitle">아티스트</div></th>
            <th>Actions<div class="subtitle">작업</div></th>
        </tr>
    </thead>

    <tbody>
        <!-- Data loads here -->
    </tbody>
</table>

<!-- 🎧 MUSIC START ON CLICK -->
<script>
let started = false;

document.addEventListener("click", () => {
    if (!started) {
        const music = document.getElementById("bgMusic");
        music.volume = 0.5; // 🔊 lower volume here
        music.play();
        started = true;
    }
});
</script>

</body>
</html>
